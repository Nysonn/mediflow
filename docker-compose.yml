services:
  app:
    build:
      context: .
      target: dev
    container_name: mediflow_app
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - /app/tmp
    env_file:
      - .env
    depends_on:
      - model_service
    restart: unless-stopped

  model_service:
    build:
      context: ./model_service
    container_name: mediflow_model
    volumes:
      - ./model_service/model:/app/model:ro
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: mediflow_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  migrate:
    build:
      context: .
      target: migrate
    container_name: mediflow_migrate
    volumes:
      - ./migrations:/app/migrations
    env_file:
      - .env
    profiles:
      - migrate
