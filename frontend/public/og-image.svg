<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2C3E6B"/>

  <!-- Decorative accent bars -->
  <rect x="0" y="0" width="8" height="630" fill="#6B8CAE" opacity="0.7"/>
  <rect x="1192" y="0" width="8" height="630" fill="#6B8CAE" opacity="0.7"/>
  <rect x="0" y="0" width="1200" height="6" fill="#6B8CAE" opacity="0.5"/>
  <rect x="0" y="624" width="1200" height="6" fill="#6B8CAE" opacity="0.5"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#6B8CAE" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circle accents -->
  <circle cx="100" cy="100" r="180" fill="#6B8CAE" opacity="0.06"/>
  <circle cx="1100" cy="530" r="200" fill="#6B8CAE" opacity="0.06"/>
  <circle cx="600" cy="315" r="350" fill="#6B8CAE" opacity="0.04"/>

  <!-- Shield/Cross Icon -->
  <!-- Shield outline -->
  <path d="M600 130 L650 150 L650 210 Q650 255 600 275 Q550 255 550 210 L550 150 Z"
        fill="none" stroke="#6B8CAE" stroke-width="3" opacity="0.9"/>
  <path d="M600 130 L650 150 L650 210 Q650 255 600 275 Q550 255 550 210 L550 150 Z"
        fill="#6B8CAE" opacity="0.15"/>
  <!-- Cross inside shield -->
  <rect x="591" y="167" width="18" height="72" rx="3" fill="white" opacity="0.95"/>
  <rect x="567" y="191" width="66" height="18" rx="3" fill="white" opacity="0.95"/>

  <!-- MediFlow wordmark -->
  <text x="600" y="355"
        font-family="Arial, Helvetica, sans-serif"
        font-size="96"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="-2">MediFlow</text>

  <!-- Accent line under title -->
  <rect x="430" y="370" width="340" height="3" rx="2" fill="#6B8CAE" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="425"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="400"
        fill="white"
        fill-opacity="0.85"
        text-anchor="middle"
        letter-spacing="0.5">Postpartum Hemorrhage Risk Prediction Platform</text>

  <!-- Tagline -->
  <text x="600" y="540"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="400"
        fill="#6B8CAE"
        fill-opacity="0.9"
        text-anchor="middle"
        letter-spacing="1">Clinical Decision Support for Healthcare Professionals</text>

  <!-- Bottom URL badge -->
  <rect x="480" y="565" width="240" height="38" rx="19" fill="#6B8CAE" opacity="0.2"/>
  <text x="600" y="589"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        fill="white"
        fill-opacity="0.7"
        text-anchor="middle">mediflow.me</text>
</svg>
